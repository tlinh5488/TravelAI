<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Travel AI - Trợ Lý Du Lịch Thông Minh</title>
    <link rel="stylesheet" href="vendor/leaflet/leaflet.css" />
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css" />
    <link rel="stylesheet" href="src/styles.css">
</head>
<body>
    <div class="app-container">
        <!-- Sidebar -->
        <aside class="sidebar">
            <div class="logo">
                <i class="fas fa-plane"></i>
                <span>Travel AI</span>
            </div>
            
            <nav class="main-nav">
                <button class="nav-item active" data-section="explore">
                    <i class="fas fa-map"></i>
                    <span>Bản Đồ</span>
                </button>
                <button class="nav-item" data-section="itinerary">
                    <i class="fas fa-calendar"></i>
                    <span>Lịch Trình</span>
                </button>
                <button class="nav-item" data-section="favorites">
                    <i class="fas fa-heart"></i>
                    <span>Yêu Thích</span>
                </button>
            </nav>
            
            <div class="filters">
                <h3>Bộ Lọc</h3>
                <input type="text" id="searchInput" placeholder="Tìm địa điểm..." class="search-box">
                
                <div class="category-filter">
                    <label><input type="checkbox" value="beach"> Biển</label>
                    <label><input type="checkbox" value="temple"> Chùa</label>
                    <label><input type="checkbox" value="mountain"> Núi</label>
                    <label><input type="checkbox" value="city"> Thành Phố</label>
                </div>
            </div>
            
            <div class="itinerary-info">
                <h3>Lịch Trình Hiện Tại</h3>
                <div id="itineraryPreview">
                    <p class="empty-state">Chưa có lịch trình</p>
                </div>
                <button id="createItineraryBtn" class="btn btn-primary">Tạo Lịch Trình Mới</button>
            </div>
        </aside>
        
        <!-- Main Content -->
        <main class="main-content">
            <!-- Explore Section -->
            <section id="explore-section" class="section active">
                <div class="map-container">
                    <div id="map"></div>
                </div>
            </section>
            
            <!-- Itinerary Section -->
            <section id="itinerary-section" class="section">
                <div class="itinerary-container">
                    <div class="itinerary-list">
                        <h2>Lịch Trình Du Lịch</h2>
                        <div id="itinerariesList"></div>
                    </div>
                </div>
            </section>
            
            <!-- Favorites Section -->
            <section id="favorites-section" class="section">
                <div class="favorites-container">
                    <h2>Địa Điểm Yêu Thích</h2>
                    <div id="favoritesList" class="locations-grid"></div>
                </div>
            </section>
        </main>
        
        <!-- Right Panel - Location Details & Chat -->
        <aside class="right-panel">
            <div class="panel-tabs">
                <button class="tab-btn active" data-tab="details">Chi Tiết</button>
                <button class="tab-btn" data-tab="chat">Chat AI</button>
            </div>
            
            <!-- Details Tab -->
            <div id="details-tab" class="tab-content active">
                <div id="locationDetails" class="empty-state">
                    <p>Chọn một địa điểm để xem chi tiết</p>
                </div>
            </div>
            
            <!-- Chat Tab -->
            <div id="chat-tab" class="tab-content">
                <div id="chatContainer" class="chat-container">
                    <div id="chatMessages" class="chat-messages"></div>
                    <div class="chat-input-area">
                        <input type="text" id="chatInput" placeholder="Nhập yêu cầu của bạn...">
                        <button id="sendChatBtn" class="btn btn-small"><i class="fas fa-paper-plane"></i></button>
                    </div>
                </div>
            </div>
        </aside>
        
        <!-- VR360 Modal -->
        <div id="vr360Modal" class="modal">
            <div class="modal-content">
                <button class="close-btn">&times;</button>
                <h2 id="vrTitle"></h2>
                <div id="vrContainer" style="width: 100%; height: 600px; background: #000;"></div>
                <div class="vr-controls">
                    <p>Bạn có thể click & kéo chuột để xoay xem quanh</p>
                </div>
            </div>
        </div>
        
        <!-- Location Details Modal -->
        <div id="locationModal" class="modal">
            <div class="modal-content modal-large">
                <button class="close-btn">&times;</button>
                <div id="modalLocationDetails"></div>
            </div>
        </div>
        
        <!-- Itinerary Builder Modal -->
        <div id="itineraryModal" class="modal">
            <div class="modal-content">
                <button class="close-btn">&times;</button>
                <h2>Tạo Lịch Trình Mới</h2>
                <form id="itineraryForm">
                    <div class="form-group">
                        <label>Tên Lịch Trình</label>
                        <input type="text" id="itineraryTitle" required>
                    </div>
                    <div class="form-group">
                        <label>Số Ngày</label>
                        <input type="number" id="itineraryDays" min="1" max="30" value="3" required>
                    </div>
                    <div class="form-group">
                        <label>Sở Thích (Chọn nhiều)</label>
                        <div id="prioritiesCheckbox"></div>
                    </div>
                    <div class="form-group">
                        <label>Mô Tả (Tùy Chọn)</label>
                        <textarea id="itineraryDescription"></textarea>
                    </div>
                    <div class="form-actions">
                        <button type="submit" class="btn btn-primary">Tạo Lịch Trình</button>
                        <button type="button" class="btn btn-secondary" onclick="document.getElementById('itineraryModal').style.display='none'">Hủy</button>
                    </div>
                </form>
            </div>
        </div>
    </div>
    
    <script src="vendor/leaflet/leaflet.js"></script>
    <script src="vendor/axios/axios.min.js"></script>
    <script src="src/app.js"></script>
</body>
</html>
